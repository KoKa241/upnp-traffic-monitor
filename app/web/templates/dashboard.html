<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t.dashboard_title }}</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'system';
            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else if (savedTheme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }
        })();
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <link rel="stylesheet" href="/static/dashboard.css">
</head>
<body>
    <main class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;">
            <h1>📊 {{ t.dashboard_title }}</h1>
            <select id="theme-select" style="width: auto; min-width: 8.5rem; margin-bottom: 0; padding: 0.2rem 1.5rem;">
                <option value="system">🌓 System</option>
                <option value="light">☀️ Light</option>
                <option value="dark">🌙 Dark</option>
            </select>
        </div>

        <div class="card">
            <h3>{{ t.day_traffic }}</h3>
            <div class="progress-text">
                <span id="day-text">{{ t.loading }}</span>
                <span id="day-limit">...</span>
            </div>
            <div class="progress-container">
                <div id="day-progress-bar" class="progress-bar" style="width: 0%;"></div>
            </div>
        </div>

        <div class="card">
            <h3>{{ t.month_traffic }}</h3>
            <div class="progress-text">
                <span id="month-text">{{ t.loading }}</span>
                <span id="month-limit">...</span>
            </div>
            <div class="progress-container">
                <div id="month-progress-bar" class="progress-bar" style="width: 0%;"></div>
            </div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 1rem;">
            <span>{{ t.next_update }} <strong id="timer">--:--</strong></span>
            <button id="btn-refresh" class="outline" style="width: auto; margin-bottom: 0; padding: 0.5rem 1rem;">{{ t.refresh_now }}</button>
        </div>
    </main>

    <script>
        window.dashboardConfig = {
            refreshIntervalSeconds: {{ refresh_interval_seconds }},
            limitText: "{{ t.limit_text }}",
            nextUpdateText: "{{ t.next_update }}",
            refreshNowText: "{{ t.refresh_now }}",
            loadingText: "{{ t.loading }}"
        };
    </script>
    <script src="/static/dashboard.js"></script>
</body>
</html>
